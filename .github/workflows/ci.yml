name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dev dependencies
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dev dependencies
        run: pip install --no-deps -e . && pip install pytest pytest-cov pytest-mock
      - name: Run tests
        run: pytest tests/ -v --tb=short
